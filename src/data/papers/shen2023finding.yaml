id: shen2023finding
title: 'Finding 709 Defects in 258 Projects: An Experience Report on Applying CodeQL to Open-Source Embedded
  Software (Experience Paper)'
authors:
- Mingjie Shen
- A. Pillai
- Brian A. Yuan
- James C. Davis
- A. Machiry
year: 2023
type: empirical
venue: Proc. ACM Softw. Eng.
venueAcronym: PACMSE
