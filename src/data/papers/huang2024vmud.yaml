abstract: The widespread use of open-source software (OSS) has led to extensive code reuse, making vulnerabilities
  in OSS significantly pervasive. The vulnerabilities due to code reuse in OSS are commonly known as vulnerable
  code clones (VCCs) or recurring vulnerabilities. Existing approaches primarily employ clone-based techniques
  to detect recurring vulnerabilities by matching vulnerable functions in software projects. These techniques
  do not incorporate specially designed mechanisms for vulnerabilities with multiple fixing functions
  (VM). Typically, they generate a signature for each fixing function and report VM using a matching-one-in-all
  approach. However, the variation in vulnerability context across diverse fixing functions results in
  varying accuracy levels in detecting VM, potentially limiting the effectiveness of existing methods.
  In this paper, we introduce VMud, a novel approach for detecting Vulnerabilities with Multiple Fixing
  Functions. VMud identifies vulnerable function clones (VCCs) through function matching similar to existing
  methods. However, VMud takes a different approach by only selecting the critical functions from VM for
  signature generation, which are a subset of the fixing functions. This step ensures that VMud focuses
  on fixing functions that offer sufficient knowledge about the VM. To cope with the potential decrease
  in recall due to excluding the remaining fixing functions, VMud employs semantic equivalent statement
  matching using these critical functions. It aims to uncover more VM by creating two signatures of each
  critical function and matching precisely by contextual semantic equivalent statement mapping on the
  two signatures. Our evaluation has demonstrated that VMud surpasses state-of-the-art vulnerability detection
  approaches by 30.30% in terms of F1-Score. Furthermore, VMud has successfully detected 275 new VM from
  84 projects, with 42 confirmed cases and 5 assigned CVE identifiers.
