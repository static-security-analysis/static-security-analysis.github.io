abstract: Static data flow analysis techniques have been broadly applied in analyzing and detecting security
  threats in web applications. However, without actual code execution, they often suffer serious precision
  issues and may even miss serious vulnerabilities, especially when facing modern JavaScript applications
  characterized by complex operations and semantics. To combat these complex semantics, we propose a novel
  semantic understanding approach, namely computation-based semantic explanation (CSE). CSE can effectively
  identify and resolve common failures arising from complex semantics in static data flow analysis, ultimately
  improving the detection of potential vulnerabilities.We implement a prototype tool of CSE, called Jasmine.
  By applying Jasmine to more than 10K real-world JavaScript programs, we find complex operations and
  semantics are prevalent in practice and heavily impede the state-of-art static techniques (e.g., Github’s
  CodeQL and IBM’s WALA) from regular security validations. Our experiments show Jasmine can effectively
  resolve complex semantics and lead to the discovery of 22 hidden vulnerabilities, which are not detectable
  by existing tools. Among these vulnerabilities, 13 ones are previously unknown, i.e., zero-day vulnerabilities.
  Up to now, nine CVEs have been issued, and five of them have been rated as ‘critical’ with a 9.8 severity
  score.
