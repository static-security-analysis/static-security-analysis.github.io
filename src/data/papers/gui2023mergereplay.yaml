id: gui2023mergereplay
title: 'Merge-Replay: Efficient IFDS-Based Taint Analysis by Consolidating Equivalent Value Flows'
authors:
- Yujiang Gui
- Dongjie He
- Jingling Xue
year: 2023
type: method
venue: IEEE/ACM International Conference on Automated Software Engineering
venueAcronym: ASE
