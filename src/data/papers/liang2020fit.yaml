abstract: 'Abstract Widely deployed IoT devices expose serious security threats because the firmware in
  them contains vulnerabilities, which are difficult to detect due to two main factors: 1) The firmware’s
  code is usually not available; 2) A same vulnerability often exists in multiple firmware with different
  architectures and/or release versions. In this paper, we propose a novel neural network-based staged
  approach to inspect vulnerabilities in firmware, which first learns semantics in binary code and utilizes
  neural network model to screen out the potential vulnerable functions, then performs bipartite graph
  matching upon three-level features between two binary functions. We implement the approach in a tool
  called FIT and evaluation results show that FIT outperforms state-of-the-art approaches, i.e., Gemini,
  CVSSA and discovRE, on both effectiveness and efficiency. FIT also detects vulnerabilities in real-world
  firmware of IoT devices, such as D-Link routers. Moreover, we make our tool and dataset publicly available
  in the hope of facilitating further researches in the firmware security field.'
