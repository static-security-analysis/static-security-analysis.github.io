abstract: 'Large Language Models (LLMs) have strong capabilities in code comprehension, but fine-tuning
  costs and semantic alignment issues limit their project-specific optimization; conversely, fine-tuned
  models such as CodeBERT are easy to fine-tune, but it is often difficult to learn vulnerability semantics
  from complex code languages. To address these challenges, this paper introduces the Multi-Model Collaborative
  Vulnerability Detection approach (M2CVD) that leverages the strong capability of analyzing vulnerability
  semantics from LLMs to improve the detection accuracy of fine-tuned models. M2CVD employs a novel collaborative
  process: first enhancing the quality of vulnerability description produced by LLMs through the understanding
  of project code by fine-tuned models, and then using these improved vulnerability descriptions to boost
  the detection accuracy of fine-tuned models. M2CVD include three main phases: 1) Initial Vulnerability
  Detection: The initial vulnerability detection is conducted by fine-tuning a detection model (e.g.,
  CodeBERT) and interacting with an LLM (e.g., ChatGPT) respectively. The vulnerability description will
  be generated by the LLM when the code is detected vulnerable by the LLM. 2) Vulnerability Description
  Refinement: By informing the LLM of the vulnerability assessment results of the detection model, we
  refine the vulnerability description by interacting with the LLM. Such refinement can enhance LLM’s
  vulnerability understanding in specific projects, effectively bridging the previously mentioned alignment
  gap; 3) Integrated Vulnerability Detection: M2CVD integrates code fragment and the refined vulnerability
  descriptions inferred to form synthetic data. Then, the synthetic data is used to fine-tune a validation
  model, optimize the defect feature learning efficiency of the model, and improve the detection accuracy.
  We demonstrated M2CVD’s effectiveness on two real-world datasets, where M2CVD significantly outperformed
  the baseline. In addition, we demonstrate that the M2CVD collaborative method can extend to other different
  LLMs and fine-tuned models to improve their accuracy in vulnerability detection tasks.'
