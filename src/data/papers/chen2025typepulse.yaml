toolName: TYPEPULSE
abstract: Rust supports type conversions and safe Rust guarantees the security of these conversions through
  robust static type checking and strict ownership guidelines. However, there are instances where programmers
  need to use unsafe Rust for certain type conversions, especially those involving pointers. Consequently,
  these conversions may cause severe memory corruption problems. Despite extensive research on type confusion
  bugs in C/C++, studies on type confusion bugs in Rust are still lacking. Also, due to Rust's new features
  in the type system, existing solutions in C/C++ cannot be directly applied to Rust. In this paper, we
  develop a static analysis tool called TYPEPULSE to detect three main categories of type confusion bugs
  in Rust including misalignment, inconsistent layout, and mismatched scope. TYPEPULSE first performs
  a type conversion analysis to collect and determine trait bounds for type pairs. Moreover, it performs
  a pointer alias analysis to resolve the alias relationship of pointers. Following the integration of
  information into the property graph, it constructs type patterns and detects each type of bug in various
  conversion scenarios. We run TYPEPULSE on the top 3,000 Rust packages and uncover 71 new type confusion
  bugs, exceeding the total number of type confusion bugs reported in RUSTSEC over the past five years.
  We have received 32 confirmations from developers, along with one CVE ID and six RUSTSEC IDs.
