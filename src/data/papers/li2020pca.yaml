abstract: Data dependence analysis underlies various applications in software quality assurance, yet existing
  frameworks/tools for this analysis commonly suffer scalability challenges. We present PCA, a static
  interprocedural data dependence analyzer for real-world C programs. PCA performs interprocedural points-to
  and data-flow analyses with a lightweight design. Most of all, it features a partial call-path (PCA)
  analysis that consists of optimization options to further speed up data dependence computation. As an
  example application of it, PCA readily supports memory leak detection, for which it helps achieve close
  or better performance and precision relative to the same application based on a state-of-the-art value
  flow analysis. In particular, it found four more memory leaks in an industry-scale system which have
  been fixed by the developers. Through the data dependence it computes, PCA can enable other applications
  (e.g., impact analysis and taint analysis).
